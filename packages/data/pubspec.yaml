name: data
description: RadioFlow data layer — Radio Browser API client, DTOs, mappers, and repositories.
publish_to: none
version: 0.0.1

environment:
  sdk: ^3.8.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  domain:
    path: ../domain
  dio: ^5.7.0
  retrofit: ^4.9.0
  json_annotation: ^4.12.0
  auto_mappr_annotation: ^2.3.0
  shared_preferences: ^2.3.3

dev_dependencies:
  build_runner: ^2.4.13
  retrofit_generator: ^10.2.0
  json_serializable: ^6.8.0
  auto_mappr: ^2.15.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
